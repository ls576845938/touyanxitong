services:
  postgres:
    image: postgres:16
    command: postgres -c shared_buffers=1GB -c work_mem=64MB -c maintenance_work_mem=256MB -c random_page_cost=1.1 -c effective_cache_size=4GB
    environment:
      POSTGRES_DB: alpha_radar
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha -d alpha_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: AlphaRadar
      ENV: docker
      DATABASE_URL: postgresql+psycopg://alpha:alpha@postgres:5432/alpha_radar
      DATABASE_POOL_PRE_PING: "true"
      MOCK_DATA: "true"
      AUTO_RUN_PIPELINE_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
